<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>WYD TMProject WASM Startup Harness</title>
  <style>
    :root {
      --panel-bg: #141414;
      --panel-border: #2a2a2a;
      --text: #e2e2e2;
    }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      font-family: monospace;
      background: #0e0e0e;
      color: var(--text);
      overflow: hidden;
    }
    .layout {
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 12px;
      width: 100%;
      height: 100%;
      padding: 12px;
    }
    body.capture .layout {
      display: block;
      padding: 0;
    }
    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid var(--panel-border);
      background: var(--panel-bg);
      border-radius: 8px;
      padding: 10px;
    }
    body.capture .panel {
      display: none;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .debug-row {
      display: grid;
      gap: 6px;
      grid-template-columns: 1fr 1fr;
      margin-bottom: 10px;
    }
    .debug-row label {
      display: grid;
      gap: 3px;
      font-size: 11px;
      color: #b7b7b7;
    }
    .debug-row input,
    .debug-row select {
      box-sizing: border-box;
      width: 100%;
      min-width: 0;
      font: inherit;
    }
    #log {
      white-space: pre-wrap;
      line-height: 1.35;
      overflow: auto;
      min-height: 0;
      flex: 1;
      border-top: 1px solid var(--panel-border);
      padding-top: 8px;
    }
    #status { color: #a0cfff; margin-bottom: 8px; }
    #state-info { color: #b8d8ff; margin-bottom: 8px; font-size: 12px; line-height: 1.35; }
    .canvas-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: #070707;
      overflow: hidden;
      min-height: 0;
    }
    body.capture .canvas-wrap {
      width: 100vw;
      height: 100vh;
      border: 0;
      border-radius: 0;
    }
    #canvas {
      width: 800px;
      height: 600px;
      max-width: 100%;
      max-height: 100%;
      display: block;
      background: #000;
      image-rendering: pixelated;
    }
    .ok { color: #7CFC7C; }
    .err { color: #ff7070; }
    h3 { margin: 0 0 10px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="panel">
      <h3>TMProject Startup Harness (_wyd_start_client)</h3>
      <div id="status">status: loading runtime...</div>
      <div id="state-info">state: unavailable</div>
      <div class="controls">
        <button id="boot-btn">Boot Client</button>
        <button id="tick-btn">Tick Once</button>
        <button id="tick120-btn">Tick 120 Frames</button>
        <button id="auto-btn">Toggle Auto Tick</button>
        <select id="screen-select">
          <option value="-1">None</option>
          <option value="0">Field</option>
          <option value="1">Test2</option>
          <option value="2">Sea</option>
          <option value="3">Login</option>
          <option value="4">Create ID</option>
          <option value="5">Select Character</option>
          <option value="6">Create Character</option>
          <option value="7">Select Server</option>
          <option value="8">Demo</option>
          <option value="9">Field2</option>
        </select>
        <button id="set-state-btn">Set State</button>
        <button id="stats-btn">Read Runtime Stats</button>
        <button id="shutdown-btn">Shutdown Client</button>
      </div>
      <div class="debug-row">
        <label>Server host
          <input id="debug-host" value="" placeholder="official host or IP" />
        </label>
        <label>Socket proxy
          <input id="socket-proxy" value="ws://127.0.0.1:8282/" />
        </label>
        <label>Account
          <input id="debug-account" value="OPENWYD01" />
        </label>
        <label>Password
          <input id="debug-password" value="TEST1234" />
        </label>
      </div>
      <div class="controls">
        <button id="dummy-login-btn">Dummy Login</button>
      </div>
      <div id="log">loading...</div>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas" width="800" height="600"></canvas>
    </div>
  </div>
  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const stateInfoEl = document.getElementById('state-info');
    const canvasEl = document.getElementById('canvas');
    const bootBtn = document.getElementById('boot-btn');
    const tickBtn = document.getElementById('tick-btn');
    const tick120Btn = document.getElementById('tick120-btn');
    const autoBtn = document.getElementById('auto-btn');
    const screenSelect = document.getElementById('screen-select');
    const setStateBtn = document.getElementById('set-state-btn');
    const statsBtn = document.getElementById('stats-btn');
    const shutdownBtn = document.getElementById('shutdown-btn');
    const debugHostInput = document.getElementById('debug-host');
    const socketProxyInput = document.getElementById('socket-proxy');
    const debugAccountInput = document.getElementById('debug-account');
    const debugPasswordInput = document.getElementById('debug-password');
    const dummyLoginBtn = document.getElementById('dummy-login-btn');
    const MAX_LOG_LINES = 800;
    let lineCount = 0;
    let autoTickRunning = false;
    let autoTickFrames = 0;
    window.__runtimeReady = false;
    const query = new URLSearchParams(window.location.search);
    const LAST_STATE_STORAGE_KEY = 'openwyd.lastState';
    const screenStates = {
      none: -1,
      field: 0,
      test2: 1,
      sea: 2,
      login: 3,
      createid: 4,
      createaccount: 4,
      selectchar: 5,
      char: 5,
      createchar: 6,
      selectserver: 7,
      server: 7,
      demo: 8,
      field2: 9
    };
    const queryScreen = (query.get('screen') || '').toLowerCase();
    const queryState = Number.parseInt(query.get('state') || '', 10);
    const isValidState = (value) => Number.isFinite(value) && value >= -1 && value <= 9;
    const readStoredState = () => {
      try {
        const stored = Number.parseInt(window.localStorage?.getItem(LAST_STATE_STORAGE_KEY) || '', 10);
        return isValidState(stored) ? stored : null;
      } catch {
        return null;
      }
    };
    const writeStoredState = (value) => {
      if (!isValidState(value)) return;
      try {
        window.localStorage?.setItem(LAST_STATE_STORAGE_KEY, String(value));
      } catch {
        // Storage can be unavailable in private/cross-origin contexts; the harness still works.
      }
    };
    const resolveInitialState = () => {
      if (query.has('state') && isValidState(queryState)) return queryState;
      if (query.has('screen') && Object.prototype.hasOwnProperty.call(screenStates, queryScreen)) return screenStates[queryScreen];
      const stored = readStoredState();
      return stored == null ? 0 : stored;
    };
    const parseSize = (value) => {
      const match = String(value || '').match(/^(\d+)x(\d+)$/i);
      if (!match) return null;
      const width = Number.parseInt(match[1], 10);
      const height = Number.parseInt(match[2], 10);
      if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) return null;
      return { width, height };
    };
    const autoConfig = {
      state: resolveInitialState(),
      debugFlags: Number.parseInt(query.get('debugFlags') || '0', 10) || 0,
      skipFvf: Number.parseInt(query.get('skipFvf') || '0', 10) || 0,
      tickBurst: Number.parseInt(query.get('tickBurst') || '0', 10) || 0,
      tickMs: Number.parseInt(query.get('tickMs') || '100', 10) || 0,
      autoboot: query.get('autoboot') !== '0',
      autostart: query.get('autostart') !== '0',
      quiet: query.get('quiet') === '1',
      layout: query.get('layout') || 'panel',
      fit: query.get('fit') || 'actual',
      fieldMode: (query.get('fieldMode') || query.get('field') || 'real').toLowerCase(),
      logicalSize: parseSize(query.get('logical')) || parseSize(query.get('canvas')) || { width: 800, height: 600 },
      socketProxyUrl: query.get('socketProxy') || 'ws://127.0.0.1:8282/',
      debugHost: query.get('host') || '',
      debugAccount: query.get('account') || 'OPENWYD01',
      debugPassword: query.get('password') || 'TEST1234'
    };
    screenSelect.value = String(autoConfig.state);
    socketProxyInput.value = autoConfig.socketProxyUrl;
    debugHostInput.value = autoConfig.debugHost;
    debugAccountInput.value = autoConfig.debugAccount;
    debugPasswordInput.value = autoConfig.debugPassword;
    if (autoConfig.layout === 'capture') {
      document.body.classList.add('capture');
    }

    const syncCanvasSize = () => {
      const logical = autoConfig.logicalSize;
      if (canvasEl.width !== logical.width || canvasEl.height !== logical.height) {
        canvasEl.width = logical.width;
        canvasEl.height = logical.height;
      }

      const wrap = canvasEl.parentElement;
      const rect = wrap ? wrap.getBoundingClientRect() : { width: logical.width, height: logical.height };
      const maxWidth = Math.max(1, rect.width);
      const maxHeight = Math.max(1, rect.height);
      const aspect = logical.width / logical.height;
      let displayWidth = logical.width;
      let displayHeight = logical.height;

      const shouldContain = autoConfig.fit === 'contain';
      if (shouldContain || displayWidth > maxWidth || displayHeight > maxHeight) {
        displayWidth = maxWidth;
        displayHeight = displayWidth / aspect;
        if (displayHeight > maxHeight) {
          displayHeight = maxHeight;
          displayWidth = displayHeight * aspect;
        }
      }

      canvasEl.style.width = `${Math.round(displayWidth)}px`;
      canvasEl.style.height = `${Math.round(displayHeight)}px`;
    };

    window.addEventListener('resize', syncCanvasSize);

    const setStatus = (msg) => {
      statusEl.textContent = `status: ${msg}`;
    };

    const moduleString = (name, ...args) => {
      if (!window.Module || typeof Module[name] !== 'function' || typeof Module.UTF8ToString !== 'function') return null;
      const ptr = Module[name](...args);
      return ptr ? Module.UTF8ToString(ptr >>> 0) : '';
    };

    const readStateDebug = () => {
      const M = window.Module || {};
      return {
        requestedState: Number(screenSelect.value),
        gameState: typeof M._wyd_get_game_state === 'function' ? M._wyd_get_game_state() : null,
        sceneType: typeof M._wyd_get_scene_type === 'function' ? M._wyd_get_scene_type() : null,
        placeholder: typeof M._wyd_state_is_placeholder === 'function' ? M._wyd_state_is_placeholder() : null,
        label: moduleString('_wyd_get_state_debug_label'),
        fieldMode: typeof M._wyd_get_field_mode === 'function' ? M._wyd_get_field_mode() : null,
        fieldFixture: typeof M._wyd_field_debug_fixture_used === 'function' ? M._wyd_field_debug_fixture_used() : null,
        fieldGround: typeof M._wyd_field_has_ground === 'function' ? M._wyd_field_has_ground() : null,
        fieldHuman: typeof M._wyd_field_has_my_human === 'function' ? M._wyd_field_has_my_human() : null,
        fieldMapX: typeof M._wyd_field_map_x === 'function' ? M._wyd_field_map_x() : null,
        fieldMapY: typeof M._wyd_field_map_y === 'function' ? M._wyd_field_map_y() : null,
        criticalType: typeof M._wyd_debug_last_critical_type === 'function' ? M._wyd_debug_last_critical_type() : null
      };
    };

    const refreshStateInfo = () => {
      const info = readStateDebug();
      const field = info.gameState === 0 || info.fieldFixture
        ? ` fieldMode=${info.fieldMode} fixture=${info.fieldFixture} ground=${info.fieldGround} human=${info.fieldHuman} map=${info.fieldMapX},${info.fieldMapY} critical=${info.criticalType}`
        : '';
      stateInfoEl.textContent = `state: requested=${info.requestedState} actual=${info.gameState} scene=${info.sceneType} placeholder=${info.placeholder} ${info.label || ''}${field}`;
      return info;
    };

    const write = (msg, cls = '') => {
      if (autoConfig.quiet) return;
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = msg;
      logEl.appendChild(line);
      lineCount += 1;
      while (lineCount > MAX_LOG_LINES && logEl.firstChild) {
        logEl.removeChild(logEl.firstChild);
        lineCount -= 1;
      }
      logEl.scrollTop = logEl.scrollHeight;
    };

    logEl.textContent = '';
    syncCanvasSize();
    refreshStateInfo();

    window.__wydHarnessConfig = {
      logicalWidth: autoConfig.logicalSize.width,
      logicalHeight: autoConfig.logicalSize.height,
      fit: autoConfig.fit,
      tickMs: autoConfig.tickMs,
      fieldMode: autoConfig.fieldMode
    };

    const applyFieldMode = () => {
      if (!window.Module || typeof Module._wyd_set_field_mode !== 'function') return;
      Module._wyd_set_field_mode(autoConfig.fieldMode === 'placeholder' ? 0 : 1);
    };

    const advanceTickTime = () => {
      if (autoConfig.tickMs > 0 && typeof Module?._wyd_debug_advance_fake_time === 'function') {
        Module._wyd_debug_advance_fake_time(autoConfig.tickMs >>> 0);
      }
    };

    window.startClient = () => {
      try {
        setStatus('running _wyd_start_client (blocking)');
        const ret = Module._wyd_start_client();
        write(`_wyd_start_client returned: ${ret}`, 'ok');
        setStatus(`_wyd_start_client returned ${ret}`);
      } catch (err) {
        write(`_wyd_start_client threw: ${err?.message || err}`, 'err');
        setStatus('_wyd_start_client failed');
      }
    };

    window.bootClient = () => {
      try {
        const ret = Module._wyd_boot_client(1);
        write(`_wyd_boot_client returned: ${ret}`, ret ? 'ok' : 'err');
        setStatus(`boot=${ret}`);
        refreshStateInfo();
        return ret;
      } catch (err) {
        write(`_wyd_boot_client threw: ${err?.message || err}`, 'err');
        setStatus('boot failed');
        return 0;
      }
    };

    window.tickClient = (silent = false, advanceTime = true) => {
      try {
        if (advanceTime) advanceTickTime();
        const ret = Module._wyd_tick_client();
        if (!silent) write(`_wyd_tick_client returned: ${ret}`, ret >= 0 ? 'ok' : 'err');
        setStatus(`tick=${ret}`);
        if (!silent) refreshStateInfo();
        return ret;
      } catch (err) {
        write(`_wyd_tick_client threw: ${err?.message || err}`, 'err');
        setStatus('tick failed');
        return -1;
      }
    };

    window.runTickBurstSync = (count) => {
      let failures = 0;
      for (let i = 0; i < count; i += 1) {
        const rc = window.tickClient(true, true);
        if (rc < 0) failures += 1;
      }
      write(`tick burst sync finished (${count}), failures=${failures}`, failures ? 'err' : 'ok');
      setStatus(`tick burst sync complete, failures=${failures}`);
      return failures;
    };

    const autoTickStep = () => {
      if (!autoTickRunning) return;
      const rc = window.tickClient(true, true);
      autoTickFrames += 1;
      if (rc < 0) {
        write(`auto tick failed at frame=${autoTickFrames} rc=${rc}`, 'err');
        autoTickRunning = false;
        autoBtn.textContent = 'Start Auto Tick';
        setStatus(`auto tick stopped rc=${rc}`);
        return;
      }
      if ((autoTickFrames % 120) === 0) {
        setStatus(`auto tick running frame=${autoTickFrames}`);
      }
      requestAnimationFrame(autoTickStep);
    };

    window.startAutoTick = () => {
      if (autoTickRunning) return;
      autoTickRunning = true;
      autoBtn.textContent = 'Stop Auto Tick';
      setStatus('auto tick running');
      requestAnimationFrame(autoTickStep);
    };

    window.stopAutoTick = () => {
      autoTickRunning = false;
      autoBtn.textContent = 'Start Auto Tick';
      setStatus('auto tick stopped');
    };

    window.shutdownClient = () => {
      try {
        const ret = Module._wyd_shutdown_client();
        write(`_wyd_shutdown_client returned: ${ret}`, ret ? 'ok' : 'err');
        setStatus(`shutdown=${ret}`);
      } catch (err) {
        write(`_wyd_shutdown_client threw: ${err?.message || err}`, 'err');
        setStatus('shutdown failed');
      }
    };

    window.setGameState = (state) => {
      try {
        if (typeof Module._wyd_set_game_state !== 'function') {
          write('_wyd_set_game_state export unavailable', 'err');
          return;
        }
        applyFieldMode();
        const requested = Number.isFinite(Number(state)) ? Number(state) : Number(screenSelect.value || 7);
        const ret = Module._wyd_set_game_state(requested);
        screenSelect.value = String(requested);
        if (ret) writeStoredState(requested);
        write(`_wyd_set_game_state(${requested}) returned: ${ret}`, ret ? 'ok' : 'err');
        const info = refreshStateInfo();
        setStatus(`state=${requested} actual=${info.gameState} rc=${ret}`);
      } catch (err) {
        write(`_wyd_set_game_state threw: ${err?.message || err}`, 'err');
      }
    };

    window.setSelectServerState = () => window.setGameState(7);

    window.runDummyLogin = () => {
      try {
        if (typeof Module._wyd_debug_selectserver_login !== 'function') {
          write('_wyd_debug_selectserver_login export unavailable', 'err');
          return 0;
        }
        Module.wydSocketProxyUrl = socketProxyInput.value || 'ws://127.0.0.1:8282/';
        const account = debugAccountInput.value || 'OPENWYD01';
        const password = debugPasswordInput.value || 'TEST1234';
        const host = debugHostInput.value || '';
        const ret = Module.ccall(
          'wyd_debug_selectserver_login',
          'number',
          ['string', 'string', 'string'],
          [account, password, host]
        );
        write(`_wyd_debug_selectserver_login(${host || '(current server)'}) returned: ${ret}`, ret ? 'ok' : 'err');
        setStatus(`dummy_login=${ret}`);
        return ret;
      } catch (err) {
        write(`_wyd_debug_selectserver_login threw: ${err?.message || err}`, 'err');
        setStatus('dummy login failed');
        return 0;
      }
    };

    window.readRuntimeStats = () => {
      try {
        const str = (name, ...args) => {
          if (typeof Module[name] !== 'function' || typeof Module.UTF8ToString !== 'function') return null;
          const ptr = Module[name](...args);
          return ptr ? Module.UTF8ToString(ptr) : '';
        };
        const stats = {
          gameState: typeof Module._wyd_get_game_state === 'function' ? Module._wyd_get_game_state() : null,
          sceneType: typeof Module._wyd_get_scene_type === 'function' ? Module._wyd_get_scene_type() : null,
          statePlaceholder: typeof Module._wyd_state_is_placeholder === 'function' ? Module._wyd_state_is_placeholder() : null,
          stateDebugLabel: str('_wyd_get_state_debug_label'),
          fieldMode: typeof Module._wyd_get_field_mode === 'function' ? Module._wyd_get_field_mode() : null,
          fieldDebugFixtureUsed: typeof Module._wyd_field_debug_fixture_used === 'function' ? Module._wyd_field_debug_fixture_used() : null,
          fieldInitialized: typeof Module._wyd_field_initialized === 'function' ? Module._wyd_field_initialized() : null,
          fieldHasGround: typeof Module._wyd_field_has_ground === 'function' ? Module._wyd_field_has_ground() : null,
          fieldHasMyHuman: typeof Module._wyd_field_has_my_human === 'function' ? Module._wyd_field_has_my_human() : null,
          fieldCriticalError: typeof Module._wyd_field_critical_error === 'function' ? Module._wyd_field_critical_error() : null,
          fieldMap: [
            typeof Module._wyd_field_map_x === 'function' ? Module._wyd_field_map_x() : null,
            typeof Module._wyd_field_map_y === 'function' ? Module._wyd_field_map_y() : null
          ],
          fieldMyHuman: [
            typeof Module._wyd_field_myhuman_x === 'function' ? Module._wyd_field_myhuman_x() : null,
            typeof Module._wyd_field_myhuman_y === 'function' ? Module._wyd_field_myhuman_y() : null
          ],
          lastCritical: {
            type: typeof Module._wyd_debug_last_critical_type === 'function' ? Module._wyd_debug_last_critical_type() : null,
            id: typeof Module._wyd_debug_last_critical_id === 'function' ? Module._wyd_debug_last_critical_id() : null,
            mesh: typeof Module._wyd_debug_last_critical_mesh === 'function' ? Module._wyd_debug_last_critical_mesh() : null,
            x: typeof Module._wyd_debug_last_critical_x === 'function' ? Module._wyd_debug_last_critical_x() : null,
            y: typeof Module._wyd_debug_last_critical_y === 'function' ? Module._wyd_debug_last_critical_y() : null,
            mobX: typeof Module._wyd_debug_last_critical_mob_x === 'function' ? Module._wyd_debug_last_critical_mob_x() : null,
            mobY: typeof Module._wyd_debug_last_critical_mob_y === 'function' ? Module._wyd_debug_last_critical_mob_y() : null
          },
          selCharInitialized: typeof Module._wyd_selchar_initialized === 'function' ? Module._wyd_selchar_initialized() : null,
          selCharCount: typeof Module._wyd_selchar_char_count === 'function' ? Module._wyd_selchar_char_count() : null,
          selCharNames: [0, 1, 2, 3].map((slot) => str('_wyd_selchar_name', slot)),
          selCharHumans: [0, 1, 2, 3].map((slot) => (
            typeof Module._wyd_selchar_human_present === 'function' ? Module._wyd_selchar_human_present(slot) : null
          )),
          serverListSample: [
            str('_wyd_serverlist_entry', 0, 0),
            str('_wyd_serverlist_entry', 0, 1),
            str('_wyd_serverlist_entry', 1, 0),
            str('_wyd_serverlist_entry', 2, 1)
          ],
          socketHost: str('_wyd_socket_last_host'),
          socketProxy: str('_wyd_socket_last_proxy_url'),
          socketPort: typeof Module._wyd_socket_last_port === 'function' ? Module._wyd_socket_last_port() : null,
          socketConnect: typeof Module._wyd_socket_last_connect_result === 'function' ? Module._wyd_socket_last_connect_result() : null,
          socketError: typeof Module._wyd_socket_last_error === 'function' ? Module._wyd_socket_last_error() : null,
          socketBytesSent: typeof Module._wyd_socket_bytes_sent === 'function' ? Module._wyd_socket_bytes_sent() : null,
          socketBytesReceived: typeof Module._wyd_socket_bytes_received === 'function' ? Module._wyd_socket_bytes_received() : null,
          socketLastSentOpcode: typeof Module._wyd_socket_last_sent_opcode === 'function' ? Module._wyd_socket_last_sent_opcode() : null,
          socketLastRecvOpcode: typeof Module._wyd_socket_last_recv_opcode === 'function' ? Module._wyd_socket_last_recv_opcode() : null,
          drawCalls: typeof Module._wyd_d3d9_draw_calls === 'function' ? Module._wyd_d3d9_draw_calls() : null,
          primitives: typeof Module._wyd_d3d9_primitives === 'function' ? Module._wyd_d3d9_primitives() : null,
          texDecodeSuccess: typeof Module._wyd_d3d9_tex_decode_success === 'function' ? Module._wyd_d3d9_tex_decode_success() : null,
          texDecodeFail: typeof Module._wyd_d3d9_tex_decode_fail === 'function' ? Module._wyd_d3d9_tex_decode_fail() : null,
          texUploads: typeof Module._wyd_d3d9_tex_uploads === 'function' ? Module._wyd_d3d9_tex_uploads() : null,
          texturedDraws: typeof Module._wyd_d3d9_textured_draws === 'function' ? Module._wyd_d3d9_textured_draws() : null,
          vsUniqueShaders: typeof Module._wyd_d3d9_vs_unique_shaders === 'function' ? Module._wyd_d3d9_vs_unique_shaders() : null,
          psUniqueShaders: typeof Module._wyd_d3d9_ps_unique_shaders === 'function' ? Module._wyd_d3d9_ps_unique_shaders() : null,
          vsBindCalls: typeof Module._wyd_d3d9_vs_bind_calls === 'function' ? Module._wyd_d3d9_vs_bind_calls() : null,
          psBindCalls: typeof Module._wyd_d3d9_ps_bind_calls === 'function' ? Module._wyd_d3d9_ps_bind_calls() : null,
          drawsWithVs: typeof Module._wyd_d3d9_draws_with_vs === 'function' ? Module._wyd_d3d9_draws_with_vs() : null,
          drawsWithPs: typeof Module._wyd_d3d9_draws_with_ps === 'function' ? Module._wyd_d3d9_draws_with_ps() : null,
          shaderFileOpenAttempts: typeof Module._wyd_d3d9_shader_file_open_attempts === 'function' ? Module._wyd_d3d9_shader_file_open_attempts() : null,
          shaderFileOpenSuccess: typeof Module._wyd_d3d9_shader_file_open_success === 'function' ? Module._wyd_d3d9_shader_file_open_success() : null,
          shaderFileOpenFail: typeof Module._wyd_d3d9_shader_file_open_fail === 'function' ? Module._wyd_d3d9_shader_file_open_fail() : null,
          shaderFileOpenSkinmesh: typeof Module._wyd_d3d9_shader_file_open_skinmesh === 'function' ? Module._wyd_d3d9_shader_file_open_skinmesh() : null,
          shaderFileOpenVsEffect: typeof Module._wyd_d3d9_shader_file_open_vseffect === 'function' ? Module._wyd_d3d9_shader_file_open_vseffect() : null,
          shaderFileOpenPsEffect: typeof Module._wyd_d3d9_shader_file_open_pseffect === 'function' ? Module._wyd_d3d9_shader_file_open_pseffect() : null,
          activeVsHashLo: typeof Module._wyd_d3d9_active_vs_hash_lo === 'function' ? Module._wyd_d3d9_active_vs_hash_lo() : null,
          activeVsHashHi: typeof Module._wyd_d3d9_active_vs_hash_hi === 'function' ? Module._wyd_d3d9_active_vs_hash_hi() : null,
          activePsHashLo: typeof Module._wyd_d3d9_active_ps_hash_lo === 'function' ? Module._wyd_d3d9_active_ps_hash_lo() : null,
          activePsHashHi: typeof Module._wyd_d3d9_active_ps_hash_hi === 'function' ? Module._wyd_d3d9_active_ps_hash_hi() : null,
          fogEnabledDraws: typeof Module._wyd_d3d9_fog_enabled_draws === 'function' ? Module._wyd_d3d9_fog_enabled_draws() : null,
          wireframeDraws: typeof Module._wyd_d3d9_wireframe_draws === 'function' ? Module._wyd_d3d9_wireframe_draws() : null,
          materialSetCalls: typeof Module._wyd_d3d9_material_set_calls === 'function' ? Module._wyd_d3d9_material_set_calls() : null,
          lightSetCalls: typeof Module._wyd_d3d9_light_set_calls === 'function' ? Module._wyd_d3d9_light_set_calls() : null,
          lightEnableCalls: typeof Module._wyd_d3d9_light_enable_calls === 'function' ? Module._wyd_d3d9_light_enable_calls() : null,
          lightedVertices: typeof Module._wyd_d3d9_lighted_vertices === 'function' ? Module._wyd_d3d9_lighted_vertices() : null
        };
        write(`runtime stats: ${JSON.stringify(stats)}`, 'ok');
      } catch (err) {
        write(`read stats failed: ${err?.message || err}`, 'err');
      }
    };

    bootBtn.addEventListener('click', () => {
      write('invoking _wyd_boot_client ...');
      window.bootClient();
    });

    tickBtn.addEventListener('click', () => {
      window.tickClient();
    });

    tick120Btn.addEventListener('click', () => {
      let left = 120;
      let failures = 0;
      const step = () => {
        if (left <= 0) {
          write(`tick burst finished (120), failures=${failures}`, failures ? 'err' : 'ok');
          setStatus(`tick burst complete, failures=${failures}`);
          return;
        }
        left -= 1;
        const rc = window.tickClient(true, true);
        if (rc < 0) failures += 1;
        requestAnimationFrame(step);
      };
      write('starting tick burst (120) ...');
      step();
    });

    autoBtn.addEventListener('click', () => {
      if (autoTickRunning) window.stopAutoTick();
      else window.startAutoTick();
    });

    setStateBtn.addEventListener('click', () => {
      window.setGameState(Number(screenSelect.value || 7));
    });

    dummyLoginBtn.addEventListener('click', () => {
      window.runDummyLogin();
    });

    statsBtn.addEventListener('click', () => {
      window.readRuntimeStats();
    });

    shutdownBtn.addEventListener('click', () => {
      write('invoking _wyd_shutdown_client ...');
      window.stopAutoTick();
      window.shutdownClient();
    });

    window.Module = {
      canvas: canvasEl,
      wydSocketProxyUrl: autoConfig.socketProxyUrl,
      print: (txt) => write(`[stdout] ${txt}`),
      printErr: (txt) => write(`[stderr] ${txt}`, 'err'),
      onRuntimeInitialized() {
        window.__runtimeReady = true;
        write('runtime initialized', 'ok');
        setStatus('runtime initialized; booting client');
        syncCanvasSize();
        applyFieldMode();
        if (!autoConfig.autoboot) {
          setStatus('runtime initialized; autoboot disabled');
          return;
        }
        const boot = window.bootClient();
        if (boot) {
          window.setGameState(autoConfig.state);
          refreshStateInfo();
          if (typeof Module._wyd_d3d9_set_debug_flags === 'function') {
            Module._wyd_d3d9_set_debug_flags(autoConfig.debugFlags >>> 0);
          }
          if (typeof Module._wyd_d3d9_set_debug_skip_fvf === 'function') {
            Module._wyd_d3d9_set_debug_skip_fvf(autoConfig.skipFvf >>> 0);
          }
          if (typeof Module._wyd_d3d9_reset_debug_counters === 'function') {
            Module._wyd_d3d9_reset_debug_counters();
          }
          if (autoConfig.tickBurst > 0) {
            window.runTickBurstSync(autoConfig.tickBurst);
          }
          if (autoConfig.autostart) {
            window.startAutoTick();
          } else {
            setStatus('runtime initialized; autostart disabled');
          }
        }
      }
    };
  </script>
  <script src="./tmproject_startup.js"></script>
</body>
</html>
