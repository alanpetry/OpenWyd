name: Deploy Field Preview

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - SECURITY.md
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.0

      - name: Build the original client runtime
        run: |
          # The object builder captures compiler stderr per translation unit. Keep
          # the actionable diagnostics visible in Actions when a Linux-only build
          # regression occurs.
          set +e
          bash webclient/client-wasm/tools/run_tmproject_wasm_objects.sh --jobs 4
          OBJECT_STATUS=$?
          if [ "$OBJECT_STATUS" -ne 0 ]; then
            echo "::group::TMProject object build report"
            cat webclient/client-wasm/build/reports/tmproject-wasm-objects.md || true
            echo "::endgroup::"
            echo "::group::First failed compiler diagnostics"
            find webclient/client-wasm/build/reports/logs-objects -name '*.stderr.txt' -size +0c -print -exec sed -n '1,80p' {} \; | head -1000 || true
            echo "::endgroup::"
            exit "$OBJECT_STATUS"
          fi
          bash webclient/client-wasm/tools/run_tmproject_wasm_startup_link.sh

      - name: Upload failed build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build-diagnostics
          path: |
            webclient/client-wasm/build/reports/tmproject-wasm-objects.json
            webclient/client-wasm/build/reports/tmproject-wasm-objects.md
            webclient/client-wasm/build/reports/logs-objects
          if-no-files-found: warn
          retention-days: 7

      - name: Package GitHub Pages site
        run: |
          python3 webclient/client-wasm/tools/prepare_pages_site.py
          test -s webclient/client-wasm/build/pages/tmproject_startup.data
          test -s webclient/client-wasm/build/pages/tmproject_startup.wasm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: webclient/client-wasm/build/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
